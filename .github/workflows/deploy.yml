name: Auth Deploy

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type DEPLOY to deploy Auth."
        required: true

permissions:
  contents: read

concurrency:
  group: auth-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"
      - uses: hashicorp/setup-terraform@v4
      - name: Validate inputs
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -ne "refs/heads/main") { throw "Use main only." }
          if ("${{ inputs.confirmation }}" -ne "DEPLOY") { throw "Confirmation must be DEPLOY." }
          if ("${{ vars.TF_STATE_KEY_AUTH }}" -ne "oficina/auth/terraform.tfstate") { throw "Invalid TF_STATE_KEY_AUTH." }
          foreach ($name in "AWS_REGION","TF_STATE_BUCKET","TF_STATE_REGION","TF_STATE_KEY_AUTH") {
            if ([string]::IsNullOrWhiteSpace((Get-Item "Env:$name" -ErrorAction SilentlyContinue).Value)) { throw "$name variable is required." }
          }
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          TF_STATE_BUCKET: ${{ vars.TF_STATE_BUCKET }}
          TF_STATE_REGION: ${{ vars.TF_STATE_REGION }}
          TF_STATE_KEY_AUTH: ${{ vars.TF_STATE_KEY_AUTH }}
      - name: Validate official config
        shell: pwsh
        run: ./scripts/validate-official-config.ps1
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: STS and prerequisites
        run: |
          aws sts get-caller-identity
          aws ssm get-parameter --name /oficina/infra/vpc/id --region "${{ vars.AWS_REGION }}"
          aws ssm get-parameter --name /oficina/infra/subnets/private/1 --region "${{ vars.AWS_REGION }}"
          aws ssm get-parameter --name /oficina/infra/subnets/private/2 --region "${{ vars.AWS_REGION }}"
          aws ssm get-parameter --name /oficina/infra/rds/security-group-id --region "${{ vars.AWS_REGION }}"
          aws secretsmanager describe-secret --secret-id /oficina/auth/database --region "${{ vars.AWS_REGION }}"
          aws secretsmanager describe-secret --secret-id /oficina/auth/jwt --region "${{ vars.AWS_REGION }}"
      - name: Restore build test package
        shell: pwsh
        run: ./scripts/package-lambdas.ps1 -RunTests
      - name: Terraform init
        working-directory: terraform/auth
        run: terraform init -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" -backend-config="region=${{ vars.TF_STATE_REGION }}" -backend-config="key=${{ vars.TF_STATE_KEY_AUTH }}"
      - name: Terraform validate
        working-directory: terraform/auth
        run: terraform validate
      - name: Terraform plan
        working-directory: terraform/auth
        run: terraform plan -out=tfplan -var="aws_region=${{ vars.AWS_REGION }}"
      - name: Terraform apply
        working-directory: terraform/auth
        run: terraform apply -auto-approve tfplan
      - name: Validate resources
        shell: pwsh
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: ./scripts/validate-auth-resources.ps1
      - name: Smoke tests
        shell: pwsh
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: ./scripts/smoke-test-auth.ps1 -Mode Lambda

