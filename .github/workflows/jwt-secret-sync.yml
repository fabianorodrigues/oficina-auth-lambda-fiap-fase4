name: Auth JWT Secret Sync

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: "Type SYNC to synchronize the JWT signing key."
        required: true

permissions:
  contents: read

concurrency:
  group: auth-jwt-secret-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate branch and confirmation
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -ne "refs/heads/main") { throw "Use main only." }
          if ("${{ inputs.confirmation }}" -ne "SYNC") { throw "Confirmation must be SYNC." }
          if ([string]::IsNullOrWhiteSpace("${{ vars.AWS_REGION }}")) { throw "AWS_REGION variable is required." }
          if ([string]::IsNullOrWhiteSpace("${{ secrets.JWT_SIGNING_KEY }}")) { throw "JWT_SIGNING_KEY secret is required." }
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: STS
        run: aws sts get-caller-identity
      - name: Validate secret container
        run: aws secretsmanager describe-secret --secret-id /oficina/auth/jwt --region "${{ vars.AWS_REGION }}"
      - name: Sync JWT secret
        shell: pwsh
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          JWT_SIGNING_KEY: ${{ secrets.JWT_SIGNING_KEY }}
        run: ./scripts/sync-jwt-secret.ps1
      - name: Validate AWSCURRENT
        run: aws secretsmanager list-secret-version-ids --secret-id /oficina/auth/jwt --include-deprecated --region "${{ vars.AWS_REGION }}"
      - name: Summary
        run: echo "JWT secret synchronized without printing payload." >> "$GITHUB_STEP_SUMMARY"

