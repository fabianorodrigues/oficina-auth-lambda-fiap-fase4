name: Auth Rollback

on:
  workflow_dispatch:
    inputs:
      auth_cpf_version:
        required: false
        description: "Published version for oficina-auth-cpf."
      authorizer_version:
        required: false
        description: "Published version for oficina-authorizer."
      confirmation:
        required: true
        description: "Type ROLLBACK to update live aliases."

permissions:
  contents: read

concurrency:
  group: auth-rollback
  cancel-in-progress: false

jobs:
  rollback:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate inputs
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -ne "refs/heads/main") { throw "Use main only." }
          if ("${{ inputs.confirmation }}" -ne "ROLLBACK") { throw "Confirmation must be ROLLBACK." }
          if ([string]::IsNullOrWhiteSpace("${{ inputs.auth_cpf_version }}") -and [string]::IsNullOrWhiteSpace("${{ inputs.authorizer_version }}")) { throw "At least one version is required." }
      - uses: aws-actions/configure-aws-credentials@v5
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Rollback aliases
        shell: pwsh
        run: |
          $authCpf = (aws ssm get-parameter --name /oficina/auth/cpf/function-name --region "${{ vars.AWS_REGION }}" | ConvertFrom-Json).Parameter.Value
          $authorizer = (aws ssm get-parameter --name /oficina/auth/authorizer/function-name --region "${{ vars.AWS_REGION }}" | ConvertFrom-Json).Parameter.Value
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.auth_cpf_version }}")) {
            aws lambda get-function --function-name "$($authCpf):${{ inputs.auth_cpf_version }}" --region "${{ vars.AWS_REGION }}" | Out-Null
            aws lambda update-alias --function-name $authCpf --name live --function-version "${{ inputs.auth_cpf_version }}" --region "${{ vars.AWS_REGION }}" | Out-Null
          }
          if (-not [string]::IsNullOrWhiteSpace("${{ inputs.authorizer_version }}")) {
            aws lambda get-function --function-name "$($authorizer):${{ inputs.authorizer_version }}" --region "${{ vars.AWS_REGION }}" | Out-Null
            aws lambda update-alias --function-name $authorizer --name live --function-version "${{ inputs.authorizer_version }}" --region "${{ vars.AWS_REGION }}" | Out-Null
          }
      - name: Smoke tests
        shell: pwsh
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: ./scripts/smoke-test-auth.ps1 -Mode Lambda
